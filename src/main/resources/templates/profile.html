<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DSA In Motion | Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-wrapper {
            max-width: 1000px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 0 20px;
        }

        @media (max-width: 768px) {
            .profile-wrapper {
                grid-template-columns: 1fr;
            }
        }

        .profile-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
        }

        .card-header {
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(169, 139, 209, 0.1);
            padding-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .card-header i {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--text-main);
        }

        .status-msg {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
        }

        .msg-success {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .msg-error {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            padding: 12px 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        .submit-btn {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
            opacity: 0.95;
        }

        .password-hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="profile-wrapper">
    <!-- Personal Information Card -->
    <div class="profile-card">
        <div class="card-header">
            <i class="fa-solid fa-id-card"></i>
            <h2>Personal Information</h2>
        </div>

        <div th:if="${success}" class="status-msg msg-success">
            <i class="fa-solid fa-circle-check"></i> <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="status-msg msg-error">
            <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span>
        </div>

        <form th:action="@{/profile/update}" method="post" onsubmit="return validatePersonalForm()">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="firstName" id="firstName" class="form-control" th:value="${user.firstName}" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="lastName" id="lastName" class="form-control" th:value="${user.lastName}" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" id="email" class="form-control" th:value="${user.email}" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" id="phone" class="form-control" th:value="${user.phone}" required>
            </div>
            <button type="submit" class="submit-btn" id="personalSubmitBtn">Update Profile</button>
        </form>
    </div>

    <!-- Security Information Card -->
    <div class="profile-card" id="security-section">
        <div class="card-header">
            <i class="fa-solid fa-shield-halved"></i>
            <h2>Security</h2>
        </div>

        <div th:if="${pwdSuccess}" class="status-msg msg-success">
            <i class="fa-solid fa-circle-check"></i> <span th:text="${pwdSuccess}"></span>
        </div>
        <div th:if="${pwdError}" class="status-msg msg-error">
            <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${pwdError}"></span>
        </div>

        <form th:action="@{/profile/change-password}" method="post" onsubmit="return validatePasswordForm()">
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="currentPassword" id="currentPassword" class="form-control" required placeholder="••••••••">
            </div>
            <div class="form-group" style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">
                <label>New Password</label>
                <input type="password" name="newPassword" id="newPassword" class="form-control" required placeholder="Minimum 8 characters">
                <div class="password-hint">8+ chars, A-Z, a-z, 0-9 & special char</div>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirmPassword" id="confirmPassword" class="form-control" required placeholder="Repeat new password">
            </div>
            <button type="submit" class="submit-btn" id="passwordSubmitBtn">Change Password</button>
        </form>
    </div>
</div>

<footer>
    © 2026 DSA In Motion | Crafted for visual learners.
</footer>

<script>


function validatePersonalForm() {
    const fname = document.getElementById("firstName").value.trim();
    const lname = document.getElementById("lastName").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();

    const nameRegex = /^[A-Za-z]+$/;
    if (!nameRegex.test(fname) || !nameRegex.test(lname)) {
        alert("Name must contain only alphabets.");
        return false;
    }

    if (!/^\d{10}$/.test(phone)) {
        alert("Phone must be exactly 10 digits.");
        return false;
    }

    if (!/^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/.test(email)) {
        alert("Enter a valid email address.");
        return false;
    }

    return true;
}

function validatePasswordForm() {
    const newPass = document.getElementById("newPassword").value;
    const confirmPass = document.getElementById("confirmPassword").value;

    if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/.test(newPass)) {
        alert("Password must be 8+ chars with A-Z, a-z, 0-9 & special char.");
        return false;
    }

    if (newPass !== confirmPass) {
        alert("New passwords do not match.");
        return false;
    }

    return true;
}
</script>

</body>
</html>
